<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie souvenirs - 18 ans</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;600;800;900&display=swap');

        :root {
            --pink: #ff4fa3;
            --purple: #7c3cff;
            --yellow: #ffd166;
            --dark: #160d20;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                    radial-gradient(circle at 15% 10%, rgba(255, 79, 163, .22), transparent 32%),
                    radial-gradient(circle at 85% 0%, rgba(124, 60, 255, .22), transparent 34%),
                    #160d20;
            font-family: Inter, sans-serif;
            color: white;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .photo-card {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .14);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 70px rgba(0, 0, 0, .25);
        }

        .photo-card img {
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            display: block;
        }

        .filter-btn.is-active {
            background: white;
            color: #160d20;
        }

        .modal {
            display: none;
        }

        .modal.is-open {
            display: flex;
        }
        .loader {
            width: 54px;
            height: 54px;

            border-radius: 999px;

            border: 4px solid rgba(255,255,255,.12);
            border-top-color: white;

            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
<main class="min-h-screen px-5 py-8 md:px-10">

    <header class="max-w-7xl mx-auto mb-10">
        <a href="index.html" class="inline-flex mb-8 text-white/70 hover:text-white font-bold">
            ← Retour au montage
        </a>

        <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
            <div>
                <p class="uppercase tracking-[.35em] text-xs font-black text-white/50 mb-4">
                    Souvenirs
                </p>

                <h1 class="font-display text-5xl md:text-7xl font-extrabold leading-none">
                    Toutes les photos
                </h1>

                <p class="mt-5 max-w-2xl text-white/70 text-lg">
                    Toutes les photos du montage sont ici, rangées par période, avec possibilité de les voir en grand et de les télécharger.
                </p>
            </div>

            <div class="flex flex-wrap gap-3">
                <button id="downloadAllBtn" class="rounded-full bg-white text-[#160d20] px-5 py-3 font-black">
                    Télécharger tout
                </button>
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto sticky top-0 z-20 py-4 backdrop-blur-xl bg-[#160d20]/70">
        <div id="filters" class="flex flex-wrap gap-2"></div>
    </section>

    <section class="max-w-7xl mx-auto mt-8">
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6"></div>
        <div id="galleryLoader" class="hidden py-20 text-center">
            <div class="text-6xl animate-pulse mb-4">
                📸
            </div>

            <div class="text-xl font-black">
                Préparation des souvenirs...
            </div>
        </div>
    </section>

</main>

<div id="photoModal" class="modal fixed inset-0 z-50 items-center justify-center bg-black/85 p-5">
    <button id="closeModal" class="absolute top-5 right-5 rounded-full bg-white text-black px-5 py-3 font-black">
        Fermer
    </button>

    <div class="max-w-5xl w-full">
        <img id="modalImg" src="" alt="" class="max-h-[78vh] mx-auto rounded-3xl object-contain">

        <div class="mt-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <p id="modalChapter" class="text-white/50 text-sm uppercase tracking-[.25em] font-black"></p>
                <h2 id="modalTitle" class="text-2xl font-black break-all"></h2>
            </div>

            <a id="modalDownload" href="#" download
               class="rounded-full bg-white text-[#160d20] px-5 py-3 font-black text-center">
                Télécharger cette photo
            </a>
        </div>
    </div>
</div>

<script src="assets/js/photos-manifest.js"></script>

<script>
    const chapters = window.CHAPTERS || [];

    const gallery = document.querySelector('#gallery');
    const filters = document.querySelector('#filters');
    const modal = document.querySelector('#photoModal');
    const modalImg = document.querySelector('#modalImg');
    const modalTitle = document.querySelector('#modalTitle');
    const modalChapter = document.querySelector('#modalChapter');
    const modalDownload = document.querySelector('#modalDownload');
    const closeModal = document.querySelector('#closeModal');
    const downloadAllBtn = document.querySelector('#downloadAllBtn');

    let currentFilter = 'all';
    let visibleCount = 40;
    const batchSize = 40;

    const allPhotos = chapters.flatMap((chapter, chapterIndex) => {
        return (chapter.photos || []).map((src, photoIndex) => {
            const filename = src.split('/').pop();

            return {
                src,
                label: filename,
                chapter: chapter.title,
                chapterIndex,
                index: photoIndex
            };
        });
    });

    function slugify(text) {
        return String(text)
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/(^-|-$)/g, '');
    }

    function getExtension(src) {
        const cleanSrc = src.split('?')[0];
        const ext = cleanSrc.split('.').pop();

        return ext ? ext.toLowerCase() : 'jpg';
    }

    async function downloadImage(url, filename) {
        try {
            const response = await fetch(encodeURI(url));

            if (!response.ok) {
                throw new Error('Image inaccessible');
            }

            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();

            a.remove();
            URL.revokeObjectURL(blobUrl);
        } catch (e) {
            console.error(e);
            alert("Impossible de télécharger cette image. Lance la page avec un petit serveur local si besoin : python3 -m http.server 8080");
        }
    }

    function createFilters() {
        const buttons = [
            { label: `Toutes (${allPhotos.length})`, value: 'all' },
            ...chapters.map((chapter, index) => ({
                label: `${chapter.title} (${chapter.photos?.length || 0})`,
                value: String(index)
            }))
        ];

        filters.innerHTML = buttons.map(btn => `
            <button
                class="filter-btn ${btn.value === 'all' ? 'is-active' : ''} rounded-full bg-white/10 border border-white/15 px-4 py-2 text-sm font-black text-white"
                data-filter="${btn.value}"
            >
                ${btn.label}
            </button>
        `).join('');

        filters.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', () => {
                currentFilter = button.dataset.filter;
                visibleCount = 40;
                filters.querySelectorAll('button').forEach(btn => btn.classList.remove('is-active'));
                button.classList.add('is-active');

                renderGallery();
            });
        });
    }

    function renderGallery() {
        const loader = document.querySelector('#galleryLoader');

        loader.classList.remove('hidden');
        gallery.style.opacity = '0';

        setTimeout(() => {
            const filteredPhotos = allPhotos.filter(photo => {
                return currentFilter === 'all' || String(photo.chapterIndex) === currentFilter;
            });

            const photos = filteredPhotos.slice(0, visibleCount);
            const hasMore = visibleCount < filteredPhotos.length;

            if (!photos.length) {
                gallery.innerHTML = `
                <div class="col-span-full rounded-[2rem] border border-white/10 bg-white/5 p-8 text-white/70">
                    Aucune photo trouvée.
                </div>
            `;
            } else {
                gallery.innerHTML = photos.map(photo => {
                    const realIndex = allPhotos.indexOf(photo);

                    return `
                    <article class="photo-card group">
                        <button class="open-photo block w-full text-left" data-index="${realIndex}">
                            <img
                                src="${encodeURI(photo.src)}"
                                alt="${photo.label}"
                                loading="lazy"
                                decoding="async"
                            >
                        </button>

                        <div class="p-4">

                            <div class="mt-4 flex gap-2">
                                <button
                                    class="open-photo flex-1 rounded-full bg-white/10 px-3 py-2 text-sm font-black"
                                    data-index="${realIndex}"
                                >
                                    Voir
                                </button>

                                <button
                                    class="download-one rounded-full bg-white text-[#160d20] px-3 py-2 text-sm font-black"
                                    data-index="${realIndex}"
                                >
                                    ↓
                                </button>
                            </div>
                        </div>
                    </article>
                `;
                }).join('');

                if (hasMore) {
                    gallery.innerHTML += `
                    <div class="col-span-full flex justify-center py-8">
                        <button id="loadMoreBtn"
                            class="rounded-full bg-white text-[#160d20] px-6 py-3 font-black">
                            Voir plus (${filteredPhotos.length - visibleCount} restantes)
                        </button>
                    </div>
                `;
                }
            }

            bindGalleryButtons();

            document.querySelector('#loadMoreBtn')?.addEventListener('click', () => {
                visibleCount += batchSize;
                renderGallery();
            });

            loader.classList.add('hidden');

            gallery.style.transition = 'opacity .35s ease';
            gallery.style.opacity = '1';

        }, 350);
    }

    function bindGalleryButtons() {
        gallery.querySelectorAll('.open-photo').forEach(btn => {
            btn.addEventListener('click', () => {
                openPhoto(Number(btn.dataset.index));
            });
        });

        gallery.querySelectorAll('.download-one').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();

                const photo = allPhotos[Number(btn.dataset.index)];
                const ext = getExtension(photo.src);

                downloadImage(photo.src, `${String(photo.index + 1).padStart(3, '0')}-${slugify(photo.chapter)}-${slugify(photo.label)}.${ext}`);
            });
        });
    }

    function openPhoto(index) {
        const photo = allPhotos[index];
        const ext = getExtension(photo.src);

        modalImg.src = encodeURI(photo.src);
        modalImg.alt = photo.label;
        modalTitle.textContent = photo.label;
        modalChapter.textContent = photo.chapter;

        modalDownload.onclick = e => {
            e.preventDefault();
            downloadImage(photo.src, `${String(photo.index + 1).padStart(3, '0')}-${slugify(photo.chapter)}-${slugify(photo.label)}.${ext}`);
        };

        modal.classList.add('is-open');
    }

    function closePhotoModal() {
        modal.classList.remove('is-open');
        modalImg.src = '';
    }

    closeModal.addEventListener('click', closePhotoModal);

    modal.addEventListener('click', e => {
        if (e.target === modal) {
            closePhotoModal();
        }
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closePhotoModal();
        }
    });

    downloadAllBtn.addEventListener('click', async () => {
        if (!allPhotos.length) {
            alert('Aucune photo à télécharger.');
            return;
        }

        if (typeof JSZip === 'undefined') {
            alert('JSZip ne semble pas chargé.');
            return;
        }

        const confirmDownload = confirm(`Le ZIP va contenir ${allPhotos.length} photos. Selon le poids des images, cela peut prendre du temps. Continuer ?`);

        if (!confirmDownload) return;

        downloadAllBtn.disabled = true;
        downloadAllBtn.textContent = 'Préparation du ZIP...';

        const zip = new JSZip();
        const folder = zip.folder('souvenirs-18-ans');

        let count = 0;

        for (const photo of allPhotos) {
            try {
                const response = await fetch(encodeURI(photo.src));

                if (!response.ok) {
                    throw new Error('Image inaccessible');
                }

                const blob = await response.blob();
                const ext = getExtension(photo.src);
                const fileName = `${String(count + 1).padStart(3, '0')}-${slugify(photo.chapter)}-${slugify(photo.label)}.${ext}`;

                folder.file(fileName, blob);
                count++;

                downloadAllBtn.textContent = `Préparation... ${count}/${allPhotos.length}`;
            } catch (e) {
                console.warn('Image ignorée :', photo.src);
            }
        }

        if (count === 0) {
            alert("Aucune image n’a pu être ajoutée au ZIP.");
            downloadAllBtn.disabled = false;
            downloadAllBtn.textContent = 'Télécharger tout';
            return;
        }

        downloadAllBtn.textContent = 'Création du ZIP...';

        const content = await zip.generateAsync({ type: 'blob' });
        const zipUrl = URL.createObjectURL(content);

        const a = document.createElement('a');
        a.href = zipUrl;
        a.download = 'photos-18-ans.zip';
        document.body.appendChild(a);
        a.click();

        a.remove();
        URL.revokeObjectURL(zipUrl);

        downloadAllBtn.disabled = false;
        downloadAllBtn.textContent = 'Télécharger tout';
    });

    createFilters();
    renderGallery();
</script>

</body>
</html>
