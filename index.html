<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>18 ans</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <link type='text/css' href='style.css' rel='Stylesheet'/>

</head>
<body>
<div class="noise"></div>

<main class="stage" id="stage">
    <div class="ambient-glow ambient-glow--pink"></div>
    <div class="ambient-glow ambient-glow--purple"></div>
    <div class="ambient-glow ambient-glow--yellow"></div>


    <section class="chapter-intro" id="chapterIntro">
        <div>
            <p class="chapter-number uppercase tracking-[.28em] text-xs md:text-sm font-black text-white/70 mb-6 mx-auto w-fit"
               id="chapterNumber">
                Chapitre 01
            </p>
            <h2 class="chapter-title font-display text-6xl md:text-8xl xl:text-9xl font-extrabold" id="chapterTitle">
                Les premiers sourires
            </h2>
        </div>
    </section>

    <div class="big-18">18</div>
    <section class="photos-layer" id="photosLayer"></section>
    <div class="chapter-caption" id="chapterCaption"></div>

    <section class="final-screen" id="finalScreen"></section>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="player-controls" aria-label="Contrôles du montage">
        <button type="button" class="control-btn" id="togglePlayBtn">Pause</button>
        <button type="button" class="control-btn control-btn--ghost" id="restartBtn">Revoir</button>
    </div>

</main>

<script src="assets/js/photos-manifest.js"></script>
<script src="script.js"></script>

</body>
</html>
