<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>18 ans - Montage souvenir</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;600;800;900&display=swap');

        :root {
            --pink: #ff4fa3;
            --purple: #7c3cff;
            --cream: #fff3dc;
            --yellow: #ffd166;
            --dark: #160d20;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 20% 20%, rgba(255, 79, 163, .35), transparent 32%),
            radial-gradient(circle at 80% 10%, rgba(124, 60, 255, .35), transparent 35%),
            radial-gradient(circle at 50% 90%, rgba(255, 210, 110, .35), transparent 35%),
            #160d20;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            isolation: isolate;
        }

        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .08;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            z-index: 100;
        }

        .ambient-glow {
            position: absolute;
            border-radius: 999px;
            filter: blur(70px);
            opacity: .55;
            pointer-events: none;
            mix-blend-mode: screen;
            will-change: transform;
        }

        .ambient-glow--pink {
            width: 420px;
            height: 420px;
            left: -120px;
            top: 12%;
            background: var(--pink);
        }

        .ambient-glow--purple {
            width: 520px;
            height: 520px;
            right: -180px;
            top: 0;
            background: var(--purple);
        }

        .ambient-glow--yellow {
            width: 400px;
            height: 400px;
            left: 38%;
            bottom: -180px;
            background: var(--yellow);
            opacity: .32;
        }

        .intro,
        .chapter-intro,
        .final-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 30;
        }

        .intro-title,
        .chapter-title,
        .final-title {
            line-height: .88;
            text-shadow: 0 24px 70px rgba(0, 0, 0, .38);
        }

        .chapter-intro {
            pointer-events: none;
            opacity: 0;
        }

        .chapter-number {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .20);
            backdrop-filter: blur(12px);
        }

        .photos-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
        }

        .polaroid {
            position: absolute;
            width: 32vw;
            padding: 20px 20px 100px;
            background: rgba(255, 250, 240, 1);
            color: #24162f;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .35);
            transform-origin: center;
            transition: box-shadow 0.3s;
            will-change: transform, opacity, left, top;
            overflow: hidden;
        }

        .polaroid:hover {
            z-index: 999 !important;
        }

        .polaroid::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .35), transparent 40%);
            pointer-events: none;
        }

        .polaroid img {
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            display: block;
            filter: saturate(1.08) contrast(1.04);
        }

        .polaroid span {
            position: absolute;
            left: 13px;
            right: 13px;
            bottom: 11px;
            font-size: 12px;
            font-weight: 900;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }

        .polaroid.is-focus {
            width: 32vw;
            z-index: 25;
        }

        .polaroid.is-focus span {
            font-size: clamp(14px, 1.2vw, 18px);
            bottom: 14px;
        }

        .chapter-caption {
            position: absolute;
            left: 50%;
            bottom: 5vh;
            transform: translateX(-50%);
            width: min(760px, calc(100vw - 32px));
            padding: 18px 24px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .18);
            backdrop-filter: blur(20px);
            text-align: center;
            color: rgba(255, 255, 255, .85);
            z-index: 28;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 20px 80px rgba(0, 0, 0, .22);
        }

        .big-18 {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-size: clamp(10rem, 32vw, 34rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -.12em;
            opacity: 0;
            color: rgba(255, 255, 255, .08);
            -webkit-text-stroke: 2px rgba(255, 255, 255, .28);
            pointer-events: none;
            z-index: 1;
        }

        .final-screen {
            opacity: 0;
            pointer-events: none;
            z-index: 40;
        }

        .final-card {
            width: min(780px, calc(100vw - 32px));
            padding: clamp(30px, 5vw, 70px);
            border-radius: 46px;
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .24);
            backdrop-filter: blur(26px);
            box-shadow: 0 30px 100px rgba(0, 0, 0, .35);
        }

        .spark {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: white;
            box-shadow: 0 0 22px white;
            opacity: 0;
            z-index: 50;
            pointer-events: none;
        }

        .progress {
            position: fixed;
            left: 24px;
            right: 24px;
            bottom: 20px;
            height: 4px;
            z-index: 90;
            border-radius: 999px;
            background: rgba(255, 255, 255, .13);
            overflow: hidden;
            pointer-events: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--pink), var(--yellow), var(--purple), var(--pink));
            background-size: 300% 100%;
            box-shadow: 0 0 18px rgba(255, 79, 163, .45);
            animation: progressGradient 3s linear infinite;
        }

        @keyframes progressGradient {
            from {
                background-position: 0% 50%;
            }
            to {
                background-position: 300% 50%;
            }
        }

        .player-controls {
            position: fixed;
            right: 24px;
            bottom: 38px;
            z-index: 95;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .12);
            border: 1px solid rgba(255, 255, 255, .22);
            backdrop-filter: blur(18px);
            box-shadow: 0 18px 60px rgba(0, 0, 0, .25);
        }

        .control-btn {
            border: 0;
            cursor: pointer;
            height: 42px;
            padding: 0 18px;
            border-radius: 999px;
            background: white;
            color: #160d20;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: .02em;
        }

        .control-btn--ghost {
            background: rgba(255, 255, 255, .14);
            color: white;
            border: 1px solid rgba(255, 255, 255, .18);
        }

        @media (max-width: 768px) {
            .polaroid {
                width: 132px;
                padding-bottom: 34px;
            }

            .polaroid.is-focus {
                width: min(310px, 78vw);
            }

            .chapter-caption {
                bottom: 7vh;
                border-radius: 26px;
            }
        }
    </style>
</head>
<body>
<div class="noise"></div>

<main class="stage" id="stage">
    <div class="ambient-glow ambient-glow--pink"></div>
    <div class="ambient-glow ambient-glow--purple"></div>
    <div class="ambient-glow ambient-glow--yellow"></div>

    <section class="intro">
        <div>
            <p class="intro-kicker uppercase tracking-[.35em] text-sm md:text-base font-black text-white/70 mb-5">
                Montage souvenir
            </p>
            <h1 class="intro-title font-display text-[18vw] md:text-[12vw] font-extrabold">
                18 ans
            </h1>
            <p class="intro-text mt-6 max-w-xl mx-auto text-lg md:text-2xl text-white/80">
                Une vie de sourires, de souvenirs et de moments précieux.
            </p>
        </div>
    </section>

    <section class="chapter-intro" id="chapterIntro">
        <div>
            <p class="chapter-number uppercase tracking-[.28em] text-xs md:text-sm font-black text-white/70 mb-6 mx-auto w-fit"
               id="chapterNumber">
                Chapitre 01
            </p>
            <h2 class="chapter-title font-display text-6xl md:text-8xl xl:text-9xl font-extrabold" id="chapterTitle">
                Les premiers sourires
            </h2>
            <p class="mt-6 max-w-2xl mx-auto text-lg md:text-2xl text-white/78" id="chapterSubtitle">
                Le début de l’histoire.
            </p>
        </div>
    </section>

    <div class="big-18">18</div>
    <section class="photos-layer" id="photosLayer"></section>
    <div class="chapter-caption" id="chapterCaption"></div>

    <section class="final-screen" id="finalScreen">
        <div class="final-card">
            <p class="uppercase tracking-[.35em] text-xs md:text-sm font-black text-white/60 mb-4">Pour toi</p>
            <h2 class="final-title font-display text-5xl md:text-8xl font-extrabold leading-none">Joyeux
                anniversaire</h2>
            <p class="mt-6 text-lg md:text-2xl text-white/80">18 ans, une nouvelle page commence ✨</p>
        </div>
    </section>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="player-controls" aria-label="Contrôles du montage">
        <button type="button" class="control-btn" id="togglePlayBtn">Pause</button>
        <button type="button" class="control-btn control-btn--ghost" id="restartBtn">Revoir</button>
    </div>

</main>

<script>
    const config = {
        introWaitEnabled: false,
        introWaitDuration: 0.9,
        maxBackgroundPhotos: 14,
        focusPhotoDuration: 1.15,
    };

    const chapters = [
        {
            title: 'Les premiers sourires',
            subtitle: 'Le début de l’histoire, les joues rondes et les regards qui font craquer tout le monde.',
            caption: 'Tout commence par ces petits moments simples qui restent pour toujours.',
            photos: [
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' }
            ]
        },
        {
            title: 'Les bêtises',
            subtitle: 'Les fous rires, les grimaces, les souvenirs un peu flous mais toujours cultes.',
            caption: 'Parce qu’une belle histoire se construit aussi avec beaucoup de bêtises.',
            photos: [
                { src: 'photos/me.jpg', label: 'me' },
                { src: 'photos/me.jpg', label: 'me' },
                { src: 'photos/me.jpg', label: 'me' },
                { src: 'photos/me.jpg', label: 'me' },
                { src: 'photos/me.jpg', label: 'me' },
                { src: 'photos/me.jpg', label: 'me' },
                { src: 'photos/me.jpg', label: 'me' },
                { src: 'photos/me.jpg', label: 'me' }
            ]
        },
        {
            title: 'La famille',
            subtitle: 'Les repas, les fêtes, les vacances, les gens qui ont toujours été là.',
            caption: 'Des souvenirs partagés, des regards, des habitudes, et beaucoup d’amour.',
            photos: [
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' }            ]
        },
        {
            title: 'Aujourd’hui',
            subtitle: '18 ans. Plus vraiment une enfant, mais toujours la même lumière pour ceux qui l’aiment.',
            caption: 'Une nouvelle page commence, avec encore tellement de choses à vivre.',
            photos: [
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' },
                { src: '/photos/me.jpg', label: 'me' }            ]
        }
    ];

    const stage = document.querySelector('#stage');
    const photosLayer = document.querySelector('#photosLayer');
    const chapterIntro = document.querySelector('#chapterIntro');
    const chapterNumber = document.querySelector('#chapterNumber');
    const chapterTitle = document.querySelector('#chapterTitle');
    const chapterSubtitle = document.querySelector('#chapterSubtitle');
    const chapterCaption = document.querySelector('#chapterCaption');
    const progressBar = document.querySelector('#progressBar');
    const togglePlayBtn = document.querySelector('#togglePlayBtn');
    const restartBtn = document.querySelector('#restartBtn');

    const isMobile = window.matchMedia('(max-width: 768px)').matches;

    const returnPositions = isMobile
        ? [
            { x: 22, y: 20, r: -10 },
            { x: 68, y: 18, r: 8 },
            { x: 30, y: 44, r: 5 },
            { x: 74, y: 46, r: -7 },
            { x: 24, y: 70, r: 9 },
            { x: 70, y: 72, r: -8 },
            { x: 50, y: 32, r: 3 },
            { x: 50, y: 61, r: -3 }
        ]
        : [
            { x: 10, y: 18, r: -11 },
            { x: 28, y: 12, r: 7 },
            { x: 48, y: 17, r: -5 },
            { x: 68, y: 13, r: 9 },
            { x: 86, y: 23, r: -8 },
            { x: 16, y: 58, r: 8 },
            { x: 36, y: 68, r: -7 },
            { x: 58, y: 62, r: 6 },
            { x: 78, y: 68, r: -4 },
            { x: 50, y: 42, r: 3 }
        ];

    function createPolaroid(photo) {
        const card = document.createElement('article');
        card.className = 'polaroid';

        card.innerHTML = `
        <img src="${photo.src}" alt="${photo.label || 'Souvenir'}">
    `;

        const spread = isMobile ? 16 : 20;
        const x = 50 + gsap.utils.random(-spread, spread);
        const y = 50 + gsap.utils.random(-spread, spread);
        const rotation = gsap.utils.random(-25, 25);
        const scale = gsap.utils.random(0.6, 0.9);
        const zIndex = Math.round(gsap.utils.random(1, 40));

        gsap.set(card, {
            left: `${x}%`,
            top: `${y}%`,
            rotation,
            scale,
            zIndex,
            xPercent: -50,
            yPercent: -50,
            opacity: 0,
            filter: 'blur(8px)',
        });

        photosLayer.appendChild(card);
        return card;
    }

    function setChapterContent(chapter, index) {
        chapterNumber.textContent = `Chapitre ${String(index + 1).padStart(2, '0')}`;
        chapterTitle.textContent = chapter.title;
        chapterSubtitle.textContent = chapter.subtitle;

        if (chapterCaption) {
            chapterCaption.textContent = chapter.caption || '';
        }
    }

    function createSparks(count = 36) {
        const sparks = [];

        for (let i = 0; i < count; i++) {
            const spark = document.createElement('span');
            spark.className = 'spark';
            stage.appendChild(spark);
            sparks.push(spark);
        }

        return sparks;
    }

    function animateSparks(timeline, sparks) {
        timeline
            .set(sparks, {
                left: '50%',
                top: '50%',
                x: () => gsap.utils.random(-20, 20),
                y: () => gsap.utils.random(-20, 20),
                scale: () => gsap.utils.random(.4, 1.4),
                opacity: 0
            })
            .to(sparks, {
                opacity: 1,
                x: () => gsap.utils.random(-520, 520),
                y: () => gsap.utils.random(-320, 320),
                duration: .75,
                stagger: .012,
                ease: 'power2.out',
            })
            .to(sparks, {
                opacity: 0,
                scale: 0,
                duration: .65,
                stagger: .008,
            }, '-=.2');
    }

    function animateChapter(timeline, chapter, index) {
        const visiblePhotos = chapter.photos.slice(0, config.maxBackgroundPhotos);
        const cards = visiblePhotos.map(createPolaroid);

        timeline
            .call(() => setChapterContent(chapter, index))
            .set(chapterIntro, { opacity: 0, scale: .96 })
            .to(chapterIntro, {
                opacity: 1,
                scale: 1,
                duration: .75,
                ease: 'power3.out'
            })
            .fromTo(chapterNumber, { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: .5 }, '<')
            .fromTo(chapterTitle, { opacity: 0, y: 44, scale: .92 }, {
                opacity: 1,
                y: 0,
                scale: 1,
                duration: .75,
                ease: 'back.out(1.5)'
            }, '<.1')
            .fromTo(chapterSubtitle, { opacity: 0, y: 22 }, {
                opacity: 1,
                y: 0,
                duration: .55
            }, '<.18')
            .to(chapterIntro, {
                opacity: 0,
                scale: 1.04,
                duration: .65,
                delay: .15,
                ease: 'power2.inOut'
            })
            .to(cards, {
                opacity: 1,
                scale: .72,
                filter: 'blur(7px)',
                duration: .85,
                stagger: .045,
                ease: 'back.out(1.45)',
            }, '-=.25');

        if (chapterCaption) {
            timeline.to(chapterCaption, {
                opacity: 1,
                y: -8,
                duration: .6,
            }, '-=.3');
        }

        cards.forEach((card, cardIndex) => {
            const pos = returnPositions[cardIndex % returnPositions.length];

            timeline
                .to(cards.filter(c => c !== card), {
                    opacity: 1,
                    scale: .66,
                    filter: 'blur(9px)',
                    duration: .35,
                    ease: 'power2.out'
                })
                .to(card, {
                    opacity: 1,
                    filter: 'blur(0px)',
                    left: '50%',
                    top: '46%',
                    xPercent: -50,
                    yPercent: -50,
                    rotation: cardIndex % 2 === 0 ? -3 : 3,
                    scale: 1,
                    zIndex: 999,
                    duration: .62,
                    ease: 'back.out(1.35)',
                    onStart: () => {
                        card.classList.add('is-focus');
                    }
                }, '<')
                .to(card, {
                    scale: .98,
                    duration: config.focusPhotoDuration,
                    ease: 'sine.inOut'
                })
                .to(card, {
                    opacity: 1,
                    filter: 'blur(7px)',
                    left: `${pos.x}%`,
                    top: `${pos.y}%`,
                    rotation: pos.r,
                    scale: .68,
                    zIndex: cardIndex + 1,
                    duration: .5,
                    ease: 'power3.inOut',
                    onComplete: () => {
                        card.classList.remove('is-focus');
                    }
                });
        });

        if (chapterCaption) {
            timeline.to(chapterCaption, {
                opacity: 0,
                y: 16,
                duration: .45,
            }, '-=.2');
        }

        timeline.to(cards, {
            opacity: 0,
            scale: .42,
            x: (i) => i % 2 === 0 ? -260 : 260,
            y: (i) => i % 3 === 0 ? -180 : 180,
            rotation: (i) => i % 2 === 0 ? -28 : 28,
            duration: .75,
            stagger: .045,
            ease: 'power3.in',
            onComplete: () => cards.forEach(card => card.remove())
        }, '+=.2');
    }

    const mainTl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    const ambientTl = gsap.timeline({ repeat: -1, yoyo: true });
    const sparks = createSparks();

    if (progressBar) {
        mainTl.eventCallback('onUpdate', () => {
            gsap.set(progressBar, {
                width: `${mainTl.progress() * 100}%`
            });
        });
    }

    mainTl
        .from('.intro-kicker', {
            opacity: 0,
            y: 24,
            duration: .8,
        }, 0)
        .from('.intro-title', {
            opacity: 0,
            scale: .75,
            y: 60,
            duration: 1.2,
            ease: 'back.out(1.7)',
        }, '-=.35')
        .from('.intro-text', {
            opacity: 0,
            y: 24,
            duration: .8,
        }, '-=.45')
        .to('.intro', {
            opacity: 0,
            scale: .94,
            duration: .55,
            pointerEvents: 'none',
        }, config.introWaitEnabled ? `+=${config.introWaitDuration}` : '+=0')
        .to('.big-18', {
            opacity: 1,
            duration: .9,
        }, '-=.4');

    chapters.forEach((chapter, index) => {
        animateChapter(mainTl, chapter, index);
    });

    animateSparks(mainTl, sparks);

    mainTl
        .to('.big-18', {
            opacity: .55,
            scale: 1.04,
            duration: .8,
            ease: 'power2.out'
        }, '-=.5')
        .to('#finalScreen', {
            opacity: 1,
            scale: 1,
            duration: 1,
            ease: 'back.out(1.3)',
        }, '-=.35')
        .from('.final-card', {
            y: 40,
            scale: .9,
            duration: .9,
            ease: 'back.out(1.3)',
        }, '<');

    ambientTl
        .to('.ambient-glow--pink', {
            x: 60,
            y: -30,
            duration: 6,
            ease: 'sine.inOut'
        }, 0)
        .to('.ambient-glow--purple', {
            x: -80,
            y: 40,
            duration: 7,
            ease: 'sine.inOut'
        }, 0)
        .to('.ambient-glow--yellow', {
            x: 40,
            y: -50,
            duration: 8,
            ease: 'sine.inOut'
        }, 0);

    let isPaused = false;

    function setPaused(value) {
        isPaused = value;

        mainTl.paused(isPaused);
        ambientTl.paused(isPaused);

        if (togglePlayBtn) {
            togglePlayBtn.textContent = isPaused ? 'Reprendre' : 'Pause';
        }

        document.body.classList.toggle('is-paused', isPaused);
    }

    if (togglePlayBtn) {
        togglePlayBtn.addEventListener('click', (e) => {
            e.preventDefault();
            setPaused(!isPaused);
        });
    }

    if (restartBtn) {
        restartBtn.addEventListener('click', (e) => {
            e.preventDefault();
            setPaused(false);
            mainTl.restart();
            ambientTl.restart();

            if (progressBar) {
                gsap.set(progressBar, { width: '0%' });
            }
        });
    }
</script>


</body>
</html>
